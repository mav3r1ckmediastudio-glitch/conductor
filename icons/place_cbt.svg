<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="0 0 92 92" role="img" aria-label="Place CBT">
  <title>Place CBT</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2A4A6A"/><stop offset="1" stop-color="#1E3A55"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#73F7FF"/><stop offset="1" stop-color="#00BFAE"/>
    </linearGradient>
    <linearGradient id="grn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4AFF91"/><stop offset="1" stop-color="#00C95A"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD66B"/><stop offset="1" stop-color="#FF8A00"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6B6B"/><stop offset="1" stop-color="#CC2020"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00FFE0" flood-opacity="0.18"/></filter>
    <style>
      .tile{fill:url(#bg);stroke:#00C9B1;stroke-width:2.5;filter:url(#soft)}
      .map{fill:none;stroke:#234653;stroke-width:1;opacity:.42}
      .c{fill:none;stroke:url(#cyan);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .cf{fill:url(#cyan);stroke:#DFFFFF;stroke-width:1.2;filter:url(#glow)}
      .g{fill:none;stroke:url(#grn);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .gf{fill:url(#grn);stroke:#C8FFE0;stroke-width:1.2;filter:url(#glow)}
      .o{fill:none;stroke:url(#orange);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .of{fill:url(#orange);stroke:#FFE9A8;stroke-width:1.2;filter:url(#glow)}
      .r{fill:none;stroke:url(#red);stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .rf{fill:url(#red);stroke:#FFB0B0;stroke-width:1.2;filter:url(#glow)}
      .w{fill:none;stroke:#EAFBFF;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
      .dot{fill:#EAFBFF;stroke:#AFFFF8;stroke-width:1.6;filter:url(#glow)}
    </style>
  </defs>
  <polygon class="tile" points="46,5 78,23.5 78,68.5 46,87 14,68.5 14,23.5"/>
  <path class="map" d="M20 28h14l8-7h11l8 7h11M20 46h16l7-6h14l6 6h9M20 64h18l7-8h16l9 8"/>
  
  <rect class="c" x="18" y="24" width="56" height="34" rx="4"/>
  <rect class="w" x="22" y="28" width="48" height="18" rx="2"/>
  <path class="c" d="M18 56h56"/>
  <circle class="gf" cx="28" cy="64" r="4.5"/>
  <circle class="gf" cx="38" cy="64" r="4.5"/>
  <circle class="gf" cx="48" cy="64" r="4.5"/>
  <circle class="gf" cx="58" cy="64" r="4.5"/>
  <circle class="gf" cx="68" cy="64" r="4.5"/>
  <circle class="of" cx="34" cy="37" r="4"/>
  <circle class="of" cx="58" cy="37" r="4"/>
</svg>