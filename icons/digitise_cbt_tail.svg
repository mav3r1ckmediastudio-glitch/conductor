<svg xmlns="http://www.w3.org/2000/svg" width="92" height="92" viewBox="0 0 92 92" role="img" aria-label="Draw CBT Tail">
  <title>Draw CBT Tail</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082A34"/><stop offset="1" stop-color="#020812"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#73F7FF"/><stop offset="1" stop-color="#00BFAE"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD66B"/><stop offset="1" stop-color="#FF8A00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00FFE0" flood-opacity="0.18"/>
    </filter>
    <style>
      .tile{fill:url(#bg);stroke:#64F5F0;stroke-width:1.4;opacity:.95;filter:url(#soft)}
      .c{fill:none;stroke:url(#cyan);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .ct{fill:url(#cyan);stroke:#DFFFFF;stroke-width:1.2;filter:url(#glow)}
      .o{fill:none;stroke:url(#orange);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .ot{fill:url(#orange);stroke:#FFE9A8;stroke-width:1.2;filter:url(#glow)}
      .dot{fill:#EAFBFF;stroke:#AFFFF8;stroke-width:1.4;filter:url(#glow)}
    </style>
  </defs>

  <!-- Hex tile background -->
  <polygon class="tile" points="46,5 78,23.5 78,68.5 46,87 14,68.5 14,23.5"/>

  <!-- CBT box top -->
  <rect class="c" x="26" y="16" width="40" height="22" rx="4"/>
  <circle class="dot" cx="36" cy="24" r="3.2"/>
  <circle class="dot" cx="46" cy="24" r="3.2"/>
  <circle class="dot" cx="56" cy="24" r="3.2"/>
  <circle class="ot" cx="36" cy="32" r="3.2"/>
  <circle class="ot" cx="46" cy="32" r="3.2"/>
  <circle class="ot" cx="56" cy="32" r="3.2"/>

  <!-- Tail fibre — curved line from CBT down to UG joint -->
  <path class="o" d="M46 38 C46 52 34 56 32 66"/>

  <!-- UG joint circle at bottom -->
  <circle class="ot" cx="32" cy="70" r="7"/>
  <circle cx="32" cy="70" r="3.5" fill="#082A34" opacity="0.7"/>

  <!-- Small arrow tip on tail -->
  <polyline class="o" points="27,64 32,70 38,65"/>
</svg>