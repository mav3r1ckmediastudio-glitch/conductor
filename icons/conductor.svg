<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1A3A5C"/>

  <!-- Cable/fibre lines — horizontal runs -->
  <line x1="4" y1="11" x2="28" y2="11" stroke="#1D7A6E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#1D7A6E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="21" x2="28" y2="21" stroke="#1D7A6E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Splitter node at centre -->
  <circle cx="16" cy="16" r="3.5" fill="#C85A00"/>

  <!-- Branch lines from splitter -->
  <line x1="16" y1="12.5" x2="16" y2="8"  stroke="#C85A00" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="19.5" x2="16" y2="24" stroke="#C85A00" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Node dots on lines -->
  <circle cx="8"  cy="11" r="1.4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="24" cy="11" r="1.4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="8"  cy="21" r="1.4" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="24" cy="21" r="1.4" fill="#FFFFFF" opacity="0.7"/>
</svg>
